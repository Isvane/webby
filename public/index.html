<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Asset Not Found</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: #f9fafb;
                color: #1f2937;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }
            .container {
                text-align: center;
                padding: 2rem;
                background: white;
                border-radius: 12px;
                box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.1),
                    0 2px 4px -1px rgba(0, 0, 0, 0.06);
                max-width: 400px;
                width: 90%;
            }
            h1 {
                font-size: 4rem;
                margin: 0;
                color: #94a3b8;
                font-weight: 300;
            }
            h2 {
                font-size: 1.5rem;
                margin-top: 0.5rem;
                color: #374151;
            }
            p {
                color: #6b7280;
                line-height: 1.5;
                font-size: 0.95rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>404</h1>
            <h2>Resource Missing</h2>
            <p>
                We couldn't find the asset you're looking for. Double-check the
                URL path or file extension for typos.
            </p>
        </div>
    </body>
</html>
